<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Daily Check-in Tracker</title>
    <link rel="icon" type="image/x-icon" href="/tracker/favicon.ico" />
    <link rel="manifest" href="/tracker/manifest.json" />
    <link rel="apple-touch-icon" href="/tracker/icon-192.png" />
  </head>
  <body>
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/tracker/sw.js').catch(function() {});
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
